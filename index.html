<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ixra | Space</title>
    <style>
        @keyframes gradient-bg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            background: linear-gradient(-45deg, #0d1117, #161b22, #0a192f, #1c1c2b);
            background-size: 400% 400%;
            animation: gradient-bg 15s ease infinite;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 40px;
            color: #58a6ff;
            text-shadow: 0px 0px 20px rgba(88, 166, 255, 0.4);
            letter-spacing: 2px;
        }

        .links-container {
            width: 100%;
            max-width: 400px;
        }

        .btn {
            background-color: rgba(22, 27, 34, 0.6);
            border: 1px solid rgba(48, 54, 61, 0.8);
            border-radius: 15px;
            padding: 18px;
            margin-bottom: 15px;
            text-align: center;
            text-decoration: none;
            color: #ffffff;
            font-weight: 500;
            display: block;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
        }

        .btn:hover {
            background-color: rgba(88, 166, 255, 0.2);
            border-color: #58a6ff;
            transform: scale(1.05);
            box-shadow: 0px 10px 25px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>

    <h1>Ixra</h1>

    <div class="links-container">
        <a href="#" class="btn">Link 1</a>
        <a href="#" class="btn">Link 2</a>
        <a href="#" class="btn">Link 3</a>
        <a href="#" class="btn">Link 4</a>
    </div>

</body>
</html>
